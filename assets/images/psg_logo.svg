<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background -->
  <rect width="400" height="400" fill="#FFFFFF"/>

  <!-- Main Logo Mark -->
  <g transform="translate(100, 100)">
    <!-- The 'P' shape - thick black bar with a red accent -->
    <rect x="0" y="0" width="30" height="200" fill="#000000"/>
    <path d="M30 0 H120 C150 0, 150 70, 120 70 H30 Z" fill="#E30613"/>

    <!-- The 'S' shape - integrated into the grid -->
    <path d="M0 100 H120 V130 H30 V150 H120 V200 H0 V170 H90 V150 H0 Z" fill="#000000"/>

    <!-- The 'G' shape - enclosing the bottom -->
    <path d="M150 200 H50 V170 H150 V50 H180 V200 Z" fill="#000000"/>

    <!-- Decorative Red Dot/Square - typical of German design -->
    <rect x="160" y="10" width="30" height="30" fill="#E30613"/>
  </g>

  <!-- Text below or integrated -->
  <text x="200" y="360" font-family="Arial, sans-serif" font-weight="900" font-size="40" text-anchor="middle" fill="#000000" letter-spacing="8">PSG</text>
  <text x="200" y="385" font-family="Arial, sans-serif" font-weight="400" font-size="12" text-anchor="middle" fill="#E30613" letter-spacing="2">PANORAMA SCHOLARLY GROUP</text>
</svg>
