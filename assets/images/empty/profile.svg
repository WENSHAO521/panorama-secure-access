<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Bauhaus: Profile/folder empty state -->
  <!-- Folder tab -->
  <rect x="60" y="88" width="70" height="18" fill="#1A1A1A"/>
  <!-- Folder body -->
  <rect x="60" y="102" width="180" height="128" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="3"/>
  <!-- Folder top border fix -->
  <rect x="128" y="99" width="112" height="6" fill="#1A1A1A"/>

  <!-- File rows inside folder -->
  <rect x="80" y="128" width="56" height="10" fill="#1A1A1A"/>
  <rect x="80" y="152" width="44" height="10" fill="#D0D0D0"/>
  <rect x="80" y="176" width="72" height="10" fill="#D0D0D0"/>
  <rect x="188" y="176" width="28" height="10" fill="#D0D0D0" opacity="0.6"/>

  <!-- Globe icon (proxy circle) — red accent -->
  <circle cx="210" cy="210" r="34" fill="#CC0000"/>
  <!-- Globe lines -->
  <circle cx="210" cy="210" r="20" fill="none" stroke="#FFFFFF" stroke-width="3"/>
  <ellipse cx="210" cy="210" rx="9" ry="20" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <rect x="190" y="208" width="40" height="2.5" fill="#FFFFFF"/>
</svg>
