  <rect x="78" y="56" width="56" height="6" fill="#FFFFFF"/>
  <rect x="186" y="56" width="34" height="6" fill="#CC0000"/>

  <!-- Table divider -->
  <rect x="68" y="70" width="164" height="2" fill="#1A1A1A"/>

  <!-- Row 1 -->
  <rect x="78" y="84" width="72" height="7" fill="#1A1A1A"/>
  <rect x="186" y="82" width="34" height="11" fill="#CC0000"/>
  <rect x="68" y="98" width="164" height="1" fill="#D0D0D0"/>

  <!-- Row 2 -->
  <rect x="78" y="110" width="52" height="7" fill="#D0D0D0"/>
