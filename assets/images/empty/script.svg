<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Bauhaus: Script/code empty state -->
  <!-- Code document -->
  <rect x="72" y="48" width="156" height="196" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="3"/>
  <!-- Header bar -->
  <rect x="72" y="48" width="156" height="22" fill="#1A1A1A"/>
  <rect x="82" y="56" width="8" height="6" fill="#CC0000"/>
  <rect x="96" y="56" width="8" height="6" fill="#FFFFFF" opacity="0.4"/>
  <rect x="110" y="56" width="8" height="6" fill="#FFFFFF" opacity="0.4"/>

  <!-- Code lines with indentation — Bauhaus monospace style -->
  <!-- Line 1 -->
  <rect x="88" y="86" width="20" height="7" fill="#CC0000"/>
  <rect x="114" y="86" width="44" height="7" fill="#1A1A1A"/>
  <rect x="164" y="86" width="18" height="7" fill="#D0D0D0"/>

  <!-- Line 2 (indented) -->
  <rect x="104" y="104" width="14" height="7" fill="#D0D0D0"/>
  <rect x="124" y="104" width="60" height="7" fill="#1A1A1A"/>

  <!-- Line 3 (double indented) -->
  <rect x="120" y="122" width="50" height="7" fill="#D0D0D0"/>
  <rect x="176" y="122" width="26" height="7" fill="#1A1A1A"/>

  <!-- Line 4 (indented) -->
  <rect x="104" y="140" width="30" height="7" fill="#D0D0D0"/>

  <!-- Line 5 -->
  <rect x="88" y="158" width="12" height="7" fill="#CC0000"/>

  <!-- Code block accent icon — red -->
  <circle cx="210" cy="220" r="34" fill="#CC0000"/>
  <!-- Brackets < > -->
  <path d="M196,210 L188,220 L196,230" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M224,210 L232,220 L224,230" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Slash -->
  <rect x="208" y="208" width="4" height="24" fill="#FFFFFF" transform="rotate(15 208 208)"/>
</svg>
