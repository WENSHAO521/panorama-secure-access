<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Bauhaus: Log empty state — document with terminal lines -->
  <rect x="70" y="50" width="160" height="200" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="3"/>
  <!-- Black header bar -->
  <rect x="70" y="50" width="160" height="22" fill="#1A1A1A"/>
  <!-- Monochrome dots -->
  <rect x="80" y="58" width="28" height="6" fill="#CC0000"/>

  <!-- Terminal-style log lines -->
  <rect x="88" y="90" width="8" height="8" fill="#CC0000"/>
  <rect x="102" y="90" width="70" height="8" fill="#1A1A1A"/>

  <rect x="88" y="110" width="8" height="8" fill="#1A1A1A"/>
  <rect x="102" y="110" width="50" height="8" fill="#D0D0D0"/>

  <rect x="88" y="130" width="8" height="8" fill="#1A1A1A"/>
  <rect x="102" y="130" width="90" height="8" fill="#D0D0D0"/>

  <rect x="88" y="150" width="8" height="8" fill="#CC0000"/>
  <rect x="102" y="150" width="60" height="8" fill="#1A1A1A"/>

  <rect x="88" y="170" width="8" height="8" fill="#1A1A1A"/>
  <rect x="102" y="170" width="40" height="8" fill="#D0D0D0"/>

  <!-- Red accent circle with list icon -->
  <circle cx="210" cy="220" r="34" fill="#CC0000"/>
  <rect x="194" y="208" width="32" height="4" fill="#FFFFFF"/>
  <rect x="194" y="218" width="32" height="4" fill="#FFFFFF"/>
  <rect x="194" y="228" width="20" height="4" fill="#FFFFFF"/>
</svg>
